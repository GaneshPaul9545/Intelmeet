version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: intellimeet-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
    container_name: intellimeet-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/intellimeet
      - JWT_SECRET=${JWT_SECRET:-change_this_to_a_strong_random_secret}
      - FRONTEND_URL=http://localhost:5173
      # Add other required environment variables here
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: .
    container_name: intellimeet-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
