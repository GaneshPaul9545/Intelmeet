services:
  # Backend API Web Service
  - type: web
    name: intellimeet-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: intellimeet-frontend
          type: web
          property: url
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # Frontend Static Site
  - type: web
    name: intellimeet-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          name: intellimeet-backend
          type: web
          property: url
